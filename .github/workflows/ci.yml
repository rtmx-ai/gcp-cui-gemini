name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  rtmx-health:
    name: RTMX Requirements Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check requirement files exist
        run: |
          echo "Checking RTMX requirements structure..."
          test -f .rtmx/config.yaml
          test -f .rtmx/database.csv
          test -d .rtmx/requirements/PROTOCOL
          test -d .rtmx/requirements/INFRA
          test -d .rtmx/requirements/STATUS
          echo "All requirement directories present."
          echo ""
          echo "Requirements database:"
          cat .rtmx/database.csv
